name: Release (Desktop Installers)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.1.0). Leave empty when running on a tag."
        required: false
        type: string
      publish:
        description: "Publish a GitHub Release (only works for tag runs)."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FRONTEND_DIR: CRM_FRONTEND

jobs:
  build-windows:
    name: Windows (NSIS .exe)
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version/tag
        id: meta
        shell: pwsh
        run: |
          $tag = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          }

          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version) -and $tag.StartsWith("v")) {
            $version = $tag.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Unable to resolve version. Provide workflow input version or run on a v* tag."
            exit 1
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Java 17 (Maven cache)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node (npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: pwsh
        run: npm ci

      - name: Align app version to release version
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: pwsh
        run: |
           $VERSION="${{ needs.build-windows.outputs.version }}"
           npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Build Windows installer
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: pwsh
        run: npm run dist

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            ${{ env.FRONTEND_DIR }}/release/*.exe
            ${{ env.FRONTEND_DIR }}/release/*.blockmap
          if-no-files-found: error

  build-macos:
    name: macOS (DMG + .app dir) — x64 + arm64
    runs-on: macos-latest
    needs: build-windows
    timeout-minutes: 60
    env:
      CI: "true"
      # Avoid keychain/code-sign discovery prompts in CI
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      # Make tooling more verbose and deterministic on GitHub runners
      npm_config_loglevel: "verbose"
      npm_config_audit: "false"
      npm_config_fund: "false"
      ELECTRON_BUILDER_LOG_LEVEL: "debug"
      DEBUG: "electron-builder,electron-builder:*"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17 (Maven cache)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node (npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Make Maven wrapper executable
        working-directory: CRM_BACKEND
        run: chmod +x mvnw

      - name: Cache electron/electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-node20-${{ hashFiles(format('{0}/package-lock.json', env.FRONTEND_DIR)) }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-node20-
            ${{ runner.os }}-electron-cache-

      - name: Cache macOS JRE archives + extracted caches
        id: cache-mac-jre
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.FRONTEND_DIR }}/resources/jre-archives
            ${{ env.FRONTEND_DIR }}/resources/jre-cache
          key: ${{ runner.os }}-adoptium-jre17-dualarch-v1

      - name: Install dependencies (verbose)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci --prefer-offline --no-progress

      - name: Align app version to release version
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          VERSION="${{ needs.build-windows.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build backend (Maven, non-interactive)
        working-directory: CRM_BACKEND
        shell: bash
        run: |
          set -euxo pipefail
          ./mvnw -B -ntp clean package -DskipTests

      - name: Copy backend JAR into Electron resources
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "${{ env.FRONTEND_DIR }}/resources/backend"
          JAR_PATH="$(ls -1 CRM_BACKEND/target/CRM_BACKEND*.jar | grep -v '\.original\.jar' | head -n 1)"
          test -n "$JAR_PATH"
          cp "$JAR_PATH" "${{ env.FRONTEND_DIR }}/resources/backend/crm-backend.jar"
          ls -lh "${{ env.FRONTEND_DIR }}/resources/backend/crm-backend.jar"

      - name: Download macOS JRE (arm64) if missing (fail-fast)
        if: ${{ steps.cache-mac-jre.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          FRONTEND="${{ env.FRONTEND_DIR }}"
          ARCH="arm64"
          DEST_DIR="$FRONTEND/resources/jre-cache/darwin-$ARCH"
          JAVA_BIN="$DEST_DIR/Contents/Home/bin/java"
          if [ -f "$JAVA_BIN" ]; then
            echo "JRE cache already present: $DEST_DIR"
            "$JAVA_BIN" -version || true
            exit 0
          fi

          mkdir -p "$FRONTEND/resources/jre-archives"
          TGZ="$FRONTEND/resources/jre-archives/jre-mac-$ARCH.tar.gz"
          URL="https://api.adoptium.net/v3/binary/latest/17/ga/mac/aarch64/jre/hotspot/normal/eclipse?project=jdk"

          # Fail fast if the download stalls: low speed for 30s, or >10 min total.
          curl -fL "$URL" \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 20 --max-time 600 \
            --speed-limit 1024 --speed-time 30 \
            -o "$TGZ"

          rm -rf "$FRONTEND/resources/jre-extract-$ARCH"
          mkdir -p "$FRONTEND/resources/jre-extract-$ARCH"
          tar -xzf "$TGZ" -C "$FRONTEND/resources/jre-extract-$ARCH"

          JDK_DIR="$(find "$FRONTEND/resources/jre-extract-$ARCH" -maxdepth 1 -type d -name '*.jre' -o -name '*.jdk' -o -name 'jdk*' | head -n 1)"
          test -n "$JDK_DIR"
          rm -rf "$DEST_DIR"
          mkdir -p "$FRONTEND/resources/jre-cache"
          cp -R "$JDK_DIR" "$DEST_DIR"
          test -f "$JAVA_BIN"
          "$JAVA_BIN" -version

      - name: Download macOS JRE (x64) if missing (fail-fast)
        if: ${{ steps.cache-mac-jre.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          FRONTEND="${{ env.FRONTEND_DIR }}"
          ARCH="x64"
          DEST_DIR="$FRONTEND/resources/jre-cache/darwin-$ARCH"
          JAVA_BIN="$DEST_DIR/Contents/Home/bin/java"
          if [ -f "$JAVA_BIN" ]; then
            echo "JRE cache already present: $DEST_DIR"
            "$JAVA_BIN" -version || true
            exit 0
          fi

          mkdir -p "$FRONTEND/resources/jre-archives"
          TGZ="$FRONTEND/resources/jre-archives/jre-mac-$ARCH.tar.gz"
          URL="https://api.adoptium.net/v3/binary/latest/17/ga/mac/x64/jre/hotspot/normal/eclipse?project=jdk"

          # Fail fast if the download stalls: low speed for 30s, or >10 min total.
          curl -fL "$URL" \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 20 --max-time 600 \
            --speed-limit 1024 --speed-time 30 \
            -o "$TGZ"

          rm -rf "$FRONTEND/resources/jre-extract-$ARCH"
          mkdir -p "$FRONTEND/resources/jre-extract-$ARCH"
          tar -xzf "$TGZ" -C "$FRONTEND/resources/jre-extract-$ARCH"

          JDK_DIR="$(find "$FRONTEND/resources/jre-extract-$ARCH" -maxdepth 1 -type d -name '*.jre' -o -name '*.jdk' -o -name 'jdk*' | head -n 1)"
          test -n "$JDK_DIR"
          rm -rf "$DEST_DIR"
          mkdir -p "$FRONTEND/resources/jre-cache"
          cp -R "$JDK_DIR" "$DEST_DIR"
          test -f "$JAVA_BIN"
          "$JAVA_BIN" -version

      - name: Generate icons (verbose)
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: bash
        run: |
          set -euxo pipefail
          node --version
          npm --version
          npm run icons

      - name: Build macOS installers (x64 + arm64)
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: bash
        run: |
          set -euxo pipefail
          npm run dist:mac --silent=false

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            ${{ env.FRONTEND_DIR }}/release/*.dmg
            ${{ env.FRONTEND_DIR }}/release/mac-*/**/*.app
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.tag }}
          name: CRM Desktop ${{ needs.build-windows.outputs.tag }}
          generate_release_notes: true
          files: |
            dist-artifacts/**/**/*.exe
            dist-artifacts/**/**/*.blockmap
            dist-artifacts/**/**/*.dmg
