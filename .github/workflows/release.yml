name: Release (Desktop Installers)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.1.0). Leave empty when running on a tag."
        required: false
        type: string
      publish:
        description: "Publish a GitHub Release (only works for tag runs)."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FRONTEND_DIR: CRM_FRONTEND

jobs:
  build-windows:
    name: Windows (NSIS .exe)
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version/tag
        id: meta
        shell: pwsh
        run: |
          $tag = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          }

          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version) -and $tag.StartsWith("v")) {
            $version = $tag.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Unable to resolve version. Provide workflow input version or run on a v* tag."
            exit 1
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Java 17 (Maven cache)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node (npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: pwsh
        run: npm ci

      - name: Align app version to release version
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: pwsh
        run: |
           $VERSION="${{ needs.build-windows.outputs.version }}"
           npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Build Windows installer
        working-directory: ${{ env.FRONTEND_DIR }}
        shell: pwsh
        run: npm run dist

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            ${{ env.FRONTEND_DIR }}/release/*.exe
            ${{ env.FRONTEND_DIR }}/release/*.blockmap
          if-no-files-found: error

  build-macos:
    name: macOS (DMG + .app dir) — x64 + arm64
    runs-on: macos-latest
    needs: build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17 (Maven cache)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node (npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Make Maven wrapper executable
        working-directory: CRM_BACKEND
        run: chmod +x mvnw

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Align app version to release version
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          VERSION="${{ needs.build-windows.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version

      - name: Prepare macOS assets (backend + dual-arch JRE cache + icons)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run predist:mac

      - name: Build macOS installers (x64 + arm64)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run dist:mac

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            ${{ env.FRONTEND_DIR }}/release/*.dmg
            ${{ env.FRONTEND_DIR }}/release/mac-*/**/*.app
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: ${{ github.ref_type == 'tag' && (inputs.publish != false) }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.tag }}
          name: CRM Desktop ${{ needs.build-windows.outputs.tag }}
          generate_release_notes: true
          files: |
            dist-artifacts/**/**/*.exe
            dist-artifacts/**/**/*.blockmap
            dist-artifacts/**/**/*.dmg
