# ═══════════════════════════════════════════════════════════════════════════
# CRM Desktop — embedded SQLite (offline, zero database setup)
# Activated by Electron: --spring.profiles.active=desktop
# Database path: CRM_DB_PATH env var (set by Electron userData/data/)
# ═══════════════════════════════════════════════════════════════════════════

server.port=5771

spring.datasource.url=jdbc:sqlite:${CRM_DB_PATH}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON; PRAGMA journal_mode=WAL;

spring.jackson.serialization.write-dates-as-timestamps=false

logging.file.name=${CRM_USER_DATA}/logs/backend.log
logging.level.root=INFO
logging.level.com.crm=INFO

# Default admin (first launch) — see DesktopStartupInitializer
crm.desktop.default-admin.username=admin
crm.desktop.default-admin.password=admin123
