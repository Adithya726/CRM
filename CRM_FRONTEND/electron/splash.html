<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
    <title>CRM Desktop</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: linear-gradient(160deg, #0f1419 0%, #162032 55%, #1a2744 100%);
        color: #e8edf4;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag;
      }

      .splash {
        text-align: center;
        padding: 2rem 2.25rem;
        width: 100%;
        -webkit-app-region: no-drag;
      }

      .logo {
        width: 76px;
        height: 76px;
        margin: 0 auto 1.25rem;
        border-radius: 18px;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.65rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        box-shadow: 0 12px 40px rgba(37, 99, 235, 0.4);
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        margin-bottom: 0.3rem;
      }

      .subtitle {
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 1.85rem;
      }

      .spinner {
        width: 38px;
        height: 38px;
        margin: 0 auto 1rem;
        border: 3px solid rgba(148, 163, 184, 0.18);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 0.76rem;
        color: #64748b;
        min-height: 1.2em;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }

      .version {
        position: fixed;
        bottom: 14px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 0.65rem;
        color: #475569;
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo" aria-hidden="true">CRM</div>
      <h1>CRM Desktop</h1>
      <p class="subtitle">Customer Relationship Management</p>
      <div class="spinner" role="status" aria-label="Loading"></div>
      <p class="loading-text" id="status">Starting application…</p>
    </div>
    <p class="version">v1.0.0</p>
  </body>
</html>
